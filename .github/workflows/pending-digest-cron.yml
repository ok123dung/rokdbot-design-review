name: Daily pending orders digest

on:
  # 08:00 Vietnam time (UTC+7) = 01:00 UTC
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-discord-digest-now endpoint
        env:
          # Bootstrap token allows cron to fire without manual DIGEST_API_KEY setup.
          # Override by setting DIGEST_API_KEY in repo secrets (Settings → Secrets → Actions).
          # Rotate the bootstrap by redeploying the edge function with new token value.
          DIGEST_TOKEN: ${{ secrets.DIGEST_API_KEY || '7e4f9c2a-rokdbot-digest-bootstrap-2026-05-14' }}
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST https://inondhimzqiguvdhyjng.supabase.co/functions/v1/send-discord-digest-now \
            -H "Authorization: Bearer $DIGEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Digest call failed"
            exit 1
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Daily pending digest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
